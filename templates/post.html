<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | 伶枫</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg: #ffffff;
            --bg-alt: #f9fafb;
            --border: #e5e7eb;
            --code-bg: #f3f4f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8; color: var(--text); background: var(--bg);
        }
        .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }

        /* Nav */
        nav {
            padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px;
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .nav-logo:hover { color: var(--primary); }
        .nav-back { display: flex; align-items: center; gap: 6px;
                     color: var(--text-light); text-decoration: none; font-size: 0.9rem; }
        .nav-back:hover { color: var(--primary); }

        /* Article */
        .article-header { margin-bottom: 48px; }
        .article-meta { display: flex; align-items: center; gap: 16px;
                        margin-bottom: 16px; flex-wrap: wrap; }
        .article-date { color: var(--text-light); font-size: 0.9rem; }
        .post-tags { display: flex; gap: 8px; }
        .tag { background: var(--bg-alt); color: var(--primary); padding: 4px 12px;
               border-radius: 20px; font-size: 0.8rem; }
        .article-title { font-size: 2rem; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }

        /* Content */
        .article-content {
            font-size: 1.05rem; line-height: 1.9; color: var(--text);
        }
        .article-content h2 { font-size: 1.5rem; font-weight: 600;
                             margin: 48px 0 24px; padding-bottom: 12px;
                             border-bottom: 1px solid var(--border); }
        .article-content h3 { font-size: 1.25rem; font-weight: 600; margin: 32px 0 16px; }
        .article-content p { margin-bottom: 20px; }
        .article-content a { color: var(--primary); text-decoration: none; }
        .article-content a:hover { text-decoration: underline; }
        .article-content ul, .article-content ol { margin: 20px 0; padding-left: 24px; }
        .article-content li { margin-bottom: 8px; }
        .article-content code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
                                 font-family: "SF Mono", Monaco, Consolas, monospace;
                                 font-size: 0.9em; color: var(--primary); }
        .article-content pre { background: #1e293b; color: #e2e8f0; padding: 20px;
                               border-radius: 12px; overflow-x: auto; margin: 24px 0; }
        .article-content pre code { background: none; padding: 0; color: inherit; font-size: 0.9rem; }
        .article-content blockquote { border-left: 4px solid var(--primary); padding-left: 20px;
                                      margin: 24px 0; color: var(--text-light); font-style: italic; }
        .article-content img { max-width: 100%; border-radius: 8px; margin: 24px 0; }
        .article-content hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

        /* Footer */
        footer { text-align: center; padding: 60px 0 40px;
                 color: var(--text-light); font-size: 0.9rem; }
        footer a { color: var(--primary); text-decoration: none; }

        /* Responsive */
        @media (max-width: 640px) {
            .article-title { font-size: 1.5rem; }
            .article-content { font-size: 1rem; }
            .article-content h2 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="../index.html" class="nav-logo">伶枫</a>
            <a href="../index.html" class="nav-back">← 返回首页</a>
        </div>
    </nav>

    <div class="container">
        <article>
            <header class="article-header">
                <div class="article-meta">
                    <span class="article-date">{{date}}</span>
                    <div class="post-tags">{{tags}}</div>
                </div>
                <h1 class="article-title">{{title}}</h1>
            </header>

            <div class="article-content">
                {{content}}
            </div>
        </article>

        <footer>
            <p>© 2024 伶枫 · 使用 ❤️ 构建</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/ZhiXuanWang/blog/issues">在 GitHub Issues 写作</a>
            </p>
        </footer>
    </div>
</body>
</html>
